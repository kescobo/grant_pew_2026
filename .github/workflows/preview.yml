name: Preview Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write     # Required for pushing PNG to preview branch
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository with all submodules
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Liberation Serif font
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y fonts-liberation
        fc-cache -fv

    - name: Cache Typst packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/typst
          ~/.local/share/typst
        key: typst-${{ runner.os }}-${{ hashFiles('**/*.typ') }}
        restore-keys: |
          typst-${{ runner.os }}-

    - name: Setup Typst
      uses: typst-community/setup-typst@v4
      with:
        typst-version: '0.14'
        cache-dependency-path: 'main.typ'

    - name: Compile grant
      run: |
        typst compile --root . --diagnostic-format short main.typ grant.pdf
        typst compile --root . --diagnostic-format short aims-standalone.typ aims.pdf

    - name: Export aims first page as PNG
      run: |
        typst compile --root . --format png --pages 1 aims-standalone.typ aims-preview.png

    - name: Upload grant PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: grant-preview
        path: grant.pdf
        retention-days: 30

    - name: Upload aims PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: aims-preview
        path: aims.pdf
        retention-days: 30

    - name: Upload aims PNG artifact
      uses: actions/upload-artifact@v4
      with:
        name: aims-preview-png
        path: aims-preview.png
        retention-days: 30

    - name: Publish PNG to preview branch
      if: github.event_name == 'push'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        cp aims-preview.png /tmp/aims-preview.png
        if git ls-remote --exit-code origin preview; then
          git fetch origin preview
          git checkout preview
        else
          git checkout --orphan preview
          git rm -rf .
        fi
        cp /tmp/aims-preview.png aims-preview.png
        git add aims-preview.png
        git diff --cached --quiet || git commit -m "chore: update preview PNG [skip ci]"
        git push origin preview

    - name: Comment on PR with artifact links
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = `### Preview Build

          | Document | Download |
          |---|---|
          | Full grant | [grant.pdf](${runUrl}) (\`grant-preview\`) |
          | Specific Aims | [aims.pdf](${runUrl}) (\`aims-preview\`) |

          **Commit:** \`${{ github.sha }}\``;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c =>
            c.user.login === 'github-actions[bot]' && c.body.startsWith('### Preview Build')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
